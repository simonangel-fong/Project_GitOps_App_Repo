name: image-push
description: Download a built image artifact, load it, and push to a Docker registry under a sha tag.

inputs:
  image-name:
    description: Local image repository name (matches build-image input).
    required: true
  image-tag:
    description: Local image tag (matches build-image input).
    required: true
  artifact-name:
    description: Artifact name produced by build-image. Defaults to <image-name>-image.
    required: false
    default: ""
  registry-namespace:
    description: Registry namespace/username (e.g. Docker Hub username or org). Will be lowercased and trimmed.
    required: true
  registry-username:
    description: Registry login username.
    required: true
  registry-password:
    description: Registry login password or token.
    required: true
  remote-tag:
    description: Tag to push to the remote registry. Defaults to the commit sha.
    required: false
    default: ${{ github.sha }}

runs:
  using: composite
  steps:
    - name: Download image artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name != '' && inputs.artifact-name || format('{0}-image', inputs.image-name) }}
        path: /tmp

    - name: Load image
      shell: bash
      run: docker load -i /tmp/${{ inputs.image-name }}.tar

    - name: Docker login
      uses: docker/login-action@v4.1.0
      with:
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Tag image for remote registry
      shell: bash
      run: |
        namespace="$(echo '${{ inputs.registry-namespace }}' | tr '[:upper:]' '[:lower:]' | xargs)"
        echo $namespace
        remote_ref="${namespace}/${{ inputs.image-name }}:${{ inputs.remote-tag }}"
        echo $remote_ref
        docker tag '${{ inputs.image-name }}:${{ inputs.image-tag }}' "$remote_ref"
        echo "REMOTE_REF=$remote_ref" >> "$GITHUB_ENV"

    - name: Push image
      shell: bash
      run: docker push "$REMOTE_REF"

