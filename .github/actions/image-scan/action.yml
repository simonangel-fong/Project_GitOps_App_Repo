name: image-scan
description: Download a built image artifact, load it into Docker, and scan with Trivy.

inputs:
  image-name:
    description: Image repository name (matches build-image input).
    required: true
  image-tag:
    description: Image tag (matches build-image input).
    required: true
  artifact-name:
    description: Artifact name produced by build-image. Defaults to <image-name>-image.
    required: false
    default: ""
  severity:
    description: Comma-separated Trivy severities that should fail the scan.
    required: false
    default: HIGH,CRITICAL
  ignore-unfixed:
    description: Skip vulnerabilities that have no fix available.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Download image artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name != '' && inputs.artifact-name || format('{0}-image', inputs.image-name) }}
        path: /tmp

    - name: Load image
      shell: bash
      run: docker load -i /tmp/${{ inputs.image-name }}.tar

    - name: Trivy scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: ${{ inputs.image-name }}:${{ inputs.image-tag }}
        format: table
        exit-code: '1'
        ignore-unfixed: ${{ inputs.ignore-unfixed }}
        severity: ${{ inputs.severity }}
