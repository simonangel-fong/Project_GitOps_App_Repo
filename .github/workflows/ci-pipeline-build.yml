name: ci-pipeline-build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/**
      - frontend/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.check.outputs.backend_changed }}
      frontend_changed: ${{ steps.check.outputs.frontend_changed }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: check
        run: |
          BACKEND=$(git diff --name-only HEAD~1 HEAD -- backend/ | wc -l)
          FRONTEND=$(git diff --name-only HEAD~1 HEAD -- frontend/ | wc -l)
          echo "backend_changed=$( [ "$BACKEND" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "frontend_changed=$( [ "$FRONTEND" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT

  backend-lint:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/app/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Checkstyle
        working-directory: backend/app
        run: |
          chmod +x mvnw
          ./mvnw checkstyle:check

  backend-dependency-scan:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/app/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Cache OWASP NVD data
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-owasp-${{ hashFiles('backend/app/pom.xml') }}
          restore-keys: ${{ runner.os }}-owasp-

      - name: OWASP Dependency Check
        working-directory: backend/app
        run: |
          chmod +x mvnw
          ./mvnw dependency-check:check

  backend-unit-test:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/app/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Backend unit tests
        working-directory: backend/app
        run: |
          chmod +x mvnw
          ./mvnw test

  backend-image-scan:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build backend image
        run: docker build -t gitops-demo:backend-${{ github.sha }} ./backend

      - name: Backend Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gitops-demo:backend-${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  frontend-lint:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/app
        run: npm ci

      - name: ESLint
        working-directory: frontend/app
        run: npm run lint

  frontend-unit-test:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/app
        run: npm ci

      - name: Frontend unit tests
        working-directory: frontend/app
        run: npm run test:coverage

  frontend-image-scan:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build frontend image
        run: docker build -t gitops-demo:frontend-${{ github.sha }} ./frontend

      - name: Frontend Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gitops-demo:frontend-${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  smoke-test:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-dependency-scan, backend-unit-test, backend-image-scan, frontend-lint, frontend-unit-test, frontend-image-scan]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Smoke test
        env:
          APP_VERSION: ${{ github.sha }}
        run: |
          docker compose up --wait
          curl --fail --retry 5 --retry-delay 3 http://localhost:8000/
          docker compose down

  backend-push:
    runs-on: ubuntu-latest
    needs: [detect-changes, smoke-test]
    if: needs.detect-changes.outputs.backend_changed == 'true'
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Docker login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_URL }}/gitops-demo:backend-${{ github.sha }} ./backend
          docker tag ${{ secrets.DOCKERHUB_URL }}/gitops-demo:backend-${{ github.sha }} ${{ secrets.DOCKERHUB_URL }}/gitops-demo:backend-latest
          docker push ${{ secrets.DOCKERHUB_URL }}/gitops-demo:backend-${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_URL }}/gitops-demo:backend-latest

  frontend-push:
    runs-on: ubuntu-latest
    needs: [detect-changes, smoke-test]
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Docker login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_URL }}/gitops-demo:frontend-${{ github.sha }} ./frontend
          docker tag ${{ secrets.DOCKERHUB_URL }}/gitops-demo:frontend-${{ github.sha }} ${{ secrets.DOCKERHUB_URL }}/gitops-demo:frontend-latest
          docker push ${{ secrets.DOCKERHUB_URL }}/gitops-demo:frontend-${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_URL }}/gitops-demo:frontend-latest

  # config-repo-pr:
  #   runs-on: ubuntu-latest
  #   needs: [detect-changes, backend-push, frontend-push]
  #   if: always() && needs.smoke-test.result == 'success'
  #   steps:
  #     - name: Checkout config repo
  #       uses: actions/checkout@v6.0.2
  #       with:
  #         repository: <org>/<config-repo>
  #         token: ${{ secrets.CONFIG_REPO_TOKEN }}
  #
  #     - name: Update image tags
  #       run: |
  #         if [ "${{ needs.detect-changes.outputs.backend_changed }}" == "true" ]; then
  #           yq e '.backend.image.tag = "${{ github.sha }}"' -i helm/values.yaml
  #         fi
  #         if [ "${{ needs.detect-changes.outputs.frontend_changed }}" == "true" ]; then
  #           yq e '.frontend.image.tag = "${{ github.sha }}"' -i helm/values.yaml
  #         fi
  #
  #     - name: Create PR
  #       run: |
  #         git checkout -b release/${{ github.sha }}
  #         git commit -am "release: update image tags to ${{ github.sha }}"
  #         git push origin release/${{ github.sha }}
  #         gh pr create --title "release: ${{ github.sha }}" --base main

  notify:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-dependency-scan, backend-unit-test, backend-image-scan, frontend-lint, frontend-unit-test, frontend-image-scan, smoke-test, backend-push, frontend-push]
    if: always()
    steps:
      - name: Notify success
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: *ci-pipeline-build passed*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "Branch",  "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Commit",  "value": "${{ github.sha }}", "short": true },
                    { "title": "Author",  "value": "${{ github.actor }}", "short": true },
                    { "title": "Run",     "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }

      - name: Notify failure
        if: ${{ contains(needs.*.result, 'failure') }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *ci-pipeline-build failed*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Branch",  "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Commit",  "value": "${{ github.sha }}", "short": true },
                    { "title": "Author",  "value": "${{ github.actor }}", "short": true },
                    { "title": "Run",     "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }
