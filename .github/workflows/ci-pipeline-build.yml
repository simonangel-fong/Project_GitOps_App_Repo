name: ci-pipeline-build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/**
      - frontend/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.check.outputs.backend_changed }}
      frontend_changed: ${{ steps.check.outputs.frontend_changed }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: check
        run: |
          BACKEND=$(git diff --name-only HEAD~1 HEAD -- backend/ | wc -l)
          FRONTEND=$(git diff --name-only HEAD~1 HEAD -- frontend/ | wc -l)
          echo "backend_changed=$( [ "$BACKEND" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "frontend_changed=$( [ "$FRONTEND" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT

  backend-build-scan:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/app/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Backend unit tests
        working-directory: backend/app
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Backend build image
        run: docker build -t gitops-demo:backend-${{ github.sha }} ./backend

      - name: Backend Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gitops-demo:backend-${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  frontend-build-scan:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/app
        run: npm ci

      - name: Frontend unit tests
        working-directory: frontend/app
        run: npm run test:coverage

      - name: Frontend build image
        run: docker build -t gitops-demo:frontend-${{ github.sha }} ./frontend

      - name: Frontend Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gitops-demo:frontend-${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  smoke-test:
    runs-on: ubuntu-latest
    needs: [backend-build-scan, frontend-build-scan]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Docker login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKERHUB_URL }}/gitops-demo:backend-${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKERHUB_URL }}/gitops-demo:frontend-${{ github.sha }} ./frontend

      - name: Smoke test
        env:
          APP_VERSION: ${{ github.sha }}
        run: |
          APP_VERSION=${APP_VERSION} docker compose up --wait --build=false
          curl --fail --retry 5 --retry-delay 3 http://localhost:8000/
          docker compose down

  backend-push:
    runs-on: ubuntu-latest
    needs: [detect-changes, smoke-test]
    if: needs.detect-changes.outputs.backend_changed == 'true'
    steps:
      - name: Docker login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push backend image
        run: |
          docker tag ${{ secrets.DOCKERHUB_URL }}/gitops-demo:backend-${{ github.sha }} ${{ secrets.DOCKERHUB_URL }}/gitops-demo:backend-latest
          docker push ${{ secrets.DOCKERHUB_URL }}/gitops-demo:backend-${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_URL }}/gitops-demo:backend-latest

  frontend-push:
    runs-on: ubuntu-latest
    needs: [detect-changes, smoke-test]
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    steps:
      - name: Docker login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push frontend image
        run: |
          docker tag ${{ secrets.DOCKERHUB_URL }}/gitops-demo:frontend-${{ github.sha }} ${{ secrets.DOCKERHUB_URL }}/gitops-demo:frontend-latest
          docker push ${{ secrets.DOCKERHUB_URL }}/gitops-demo:frontend-${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_URL }}/gitops-demo:frontend-latest

