name: 30-cd-build-test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/**
      - frontend/**

concurrency:
  group: cd-build-test
  cancel-in-progress: false

permissions:
  contents: read

env:
  backend-dockerfile-path: backend
  backend-image-name: gitops-demo-backend
  backend-image-tag: main
  frontend-dockerfile-path: frontend
  frontend-image-name: gitops-demo-frontend
  frontend-image-tag: main

jobs:
  # Backend Lint Check
  backend-lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-lint-check

  # Backend Maven Build
  backend-build-maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-build-maven

  # Backend Unit Test
  backend-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-unit-test

  # Backend Image Build
  backend-build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/build-image
        with:
          context: ${{ env.backend-dockerfile-path }}
          image-name: ${{ env.backend-image-name }}
          image-tag: ${{ env.backend-image-tag }}-${{ github.sha }}
          upload-artifact: "true"

  # Frontend Lint Check
  frontend-lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/frontend-lint-check

  # Frontend Unit Test
  frontend-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/frontend-unit-test

  # Frontend npm Build
  frontend-build-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/frontend-build-npm

  # Frontend Image Build
  frontend-build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/build-image
        with:
          context: ${{ env.frontend-dockerfile-path }}
          image-name: ${{ env.frontend-image-name }}
          image-tag: ${{ env.frontend-image-tag }}-${{ github.sha }}
          upload-artifact: "true"

  # Backend Image Scan
  backend-image-scan:
    runs-on: ubuntu-latest
    needs: backend-build-image
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/image-scan
        with:
          image-name: ${{ env.backend-image-name }}
          image-tag: ${{ env.backend-image-tag }}-${{ github.sha }}

  # Frontend Image Scan
  frontend-image-scan:
    runs-on: ubuntu-latest
    needs: frontend-build-image
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/image-scan
        with:
          image-name: ${{ env.frontend-image-name }}
          image-tag: ${{ env.frontend-image-tag }}-${{ github.sha }}

  # Smoke Test: run both images via docker compose, verify integration
  smoke-test:
    runs-on: ubuntu-latest
    needs:
      - backend-build-image
      - frontend-build-image
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.backend-image-name }}-image
          path: /tmp

      - name: Download frontend image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.frontend-image-name }}-image
          path: /tmp

      - name: Load images
        run: |
          docker load -i /tmp/${{ env.backend-image-name }}.tar
          docker load -i /tmp/${{ env.frontend-image-name }}.tar

      - name: Start stack
        env:
          BACKEND_IMAGE: ${{ env.backend-image-name }}:${{ env.backend-image-tag }}-${{ github.sha }}
          FRONTEND_IMAGE: ${{ env.frontend-image-name }}:${{ env.frontend-image-tag }}-${{ github.sha }}
        run: docker compose up -d --wait

      - name: Curl frontend root
        run: curl --fail --retry 5 --retry-delay 3 --retry-connrefused http://localhost:8000/

      - name: Curl backend via frontend proxy
        run: curl --fail --retry 5 --retry-delay 3 --retry-connrefused http://localhost:8000/api/health

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  notify:
    runs-on: ubuntu-latest
    needs:
      - backend-lint-check
      - backend-build-maven
      - backend-unit-test
      - backend-build-image
      - backend-image-scan
      - frontend-lint-check
      - frontend-unit-test
      - frontend-build-npm
      - frontend-build-image
      - frontend-image-scan
      - smoke-test
    if: always()
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          needs-context: ${{ toJSON(needs) }}
