name: 10-ci-backend

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - backend/**
  push:
    branches-ignore:
      - main
    paths:
      - backend/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  backend-dockerfile-path: backend
  backend-image-name: gitops-demo-backend
  backend-image-tag: pr

jobs:
  # Backend Lint Check
  backend-lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-lint-check

  # Backend Unit Test
  backend-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-unit-check

  # Backend Maven Build
  backend-build-maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-build-maven

  # Backend Image Build
  backend-build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build image
        run: |
          PR_NUMBER=${{ github.event.pull_request.number || github.run_number }}
          docker build -t ${{ env.backend-image-name }}:${{ env.backend-image-tag }}-${PR_NUMBER} ./${{ env.backend-dockerfile-path }}

  notify:
    runs-on: ubuntu-latest
    needs:
      - backend-lint-check
      - backend-unit-test
      - backend-build-maven
      - backend-build-image
    if: always()
    steps:
      - name: Compute overall status
        id: status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "icon=:x:" >> "$GITHUB_OUTPUT"
            echo "color=danger" >> "$GITHUB_OUTPUT"
            echo "title=10-ci-backend failed" >> "$GITHUB_OUTPUT"
          else
            echo "icon=:white_check_mark:" >> "$GITHUB_OUTPUT"
            echo "color=good" >> "$GITHUB_OUTPUT"
            echo "title=10-ci-backend succeeded" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.status.outputs.icon }} *${{ steps.status.outputs.title }}*",
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "fields": [
                    { "title": "Branch",  "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Commit",  "value": "${{ github.sha }}", "short": true },
                    { "title": "Run",     "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }
