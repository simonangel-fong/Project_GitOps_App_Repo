name: 10-ci-backend

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - backend/**
  push:
    branches:
      - feature/*
    paths:
      - backend/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lint Check
  lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-lint-check

  # # Scan dependencies
  # dependency-scan:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6.0.2
  #     - uses: ./.github/actions/backend-dependency-scan

  # Build
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-build

  # Unit Test
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-unit-check

  # # Build and scan image
  # image-build-scan:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6.0.2

  #     - name: Build image
  #       run: |
  #         PR_NUMBER=${{ github.event.pull_request.number || github.run_number }}
  #         docker build -t gitops-demo:backend-pr-${PR_NUMBER} ./backend

  #     - name: Trivy image scan
  #       uses: aquasecurity/trivy-action@v0.36.0
  #       with:
  #         image-ref: gitops-demo:backend-pr-${{ github.event.pull_request.number || github.run_number }}
  #         format: table
  #         exit-code: "1"
  #         ignore-unfixed: true
  #         severity: HIGH,CRITICAL

  notify:
    runs-on: ubuntu-latest
    needs:
      - lint-check
      # - dependency-scan
      - build
      - unit-test
      # - image-build-scan
    if: failure()
    steps:
      - name: Notify on failure
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *ci-backend-check failed*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Branch",  "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Commit",  "value": "${{ github.sha }}", "short": true },
                    { "title": "Run",     "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }
