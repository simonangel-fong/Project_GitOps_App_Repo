name: ci-backend-check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - backend/**
  push:
    branches:
      - feature/*
    paths:
      - backend/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lint Check
  lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: "25"
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/app/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Checkstyle
        working-directory: backend/app
        run: |
          chmod +x mvnw
          ./mvnw checkstyle:check

  # Scan dependencies
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: "25"
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/app/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Cache OWASP NVD data
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-owasp-${{ hashFiles('backend/app/pom.xml') }}
          restore-keys: ${{ runner.os }}-owasp-

      - name: OWASP Dependency Check
        working-directory: backend/app
        run: |
          chmod +x mvnw
          ./mvnw dependency-check:check

  # Unit Test
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: "25"
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/app/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Unit tests with coverage
        working-directory: backend/app
        run: |
          chmod +x mvnw
          ./mvnw test

  # Build and scan image
  image-build-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build image
        run: |
          PR_NUMBER=${{ github.event.pull_request.number || github.run_number }}
          docker build -t gitops-demo:backend-pr-${PR_NUMBER} ./backend

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gitops-demo:backend-pr-${{ github.event.pull_request.number || github.run_number }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

