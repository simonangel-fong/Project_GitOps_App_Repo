name: ci-backend-check

on:
  pull_request:
    branches:
      - main
    paths:
      - backend/**
  push:
    branches:
      - feature/*
    paths:
      - backend/**

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/app/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Checkstyle
        working-directory: backend/app
        run: ./mvnw checkstyle:check

  dependency-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/app/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Cache OWASP NVD data
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-owasp-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-owasp-

      # - name: OWASP Dependency Check
      #   working-directory: backend/app
      #   run: ./mvnw dependency-check:check
      #   env:
      #     NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

  unit-test:
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/app/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Unit tests with coverage
        working-directory: backend/app
        run: ./mvnw test

  maven-build:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/app/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Package
        working-directory: backend/app
        run: ./mvnw package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v7.0.1
        with:
          name: backend-jar
          path: backend/app/target/*.jar
          retention-days: 1

  image-build:
    runs-on: ubuntu-latest
    needs: maven-build
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download JAR
        uses: actions/download-artifact@v8.0.1
        with:
          name: backend-jar
          path: backend/app/target
      - name: Docker login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          PR_NUMBER=${{ github.event.pull_request.number || github.run_number }}
          docker build -t ${{ secrets.DOCKERHUB_URL }}/gitops-demo:backend-pr-${PR_NUMBER} ./backend

  image-scan:
    runs-on: ubuntu-latest
    needs: image-build
    steps:
      - name: Docker login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image for scanning
        run: |
          PR_NUMBER=${{ github.event.pull_request.number || github.run_number }}
          docker pull ${{ secrets.DOCKERHUB_URL }}/gitops-demo:backend-pr-${PR_NUMBER}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_URL }}/gitops-demo:backend-pr-${PR_NUMBER}-${{ github.event.pull_request.number || github.run_number }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  # notify:
  #   runs-on: ubuntu-latest
  #   needs: [lint, dependency-scan, unit-test, maven-build, image-build, image-scan]
  #   if: failure()
  #   steps:
      - name: Notify on failure
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *ci-backend-check failed*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Branch",  "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Commit",  "value": "${{ github.sha }}", "short": true },
                    { "title": "Run",     "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                  ]
                }
              ]
            }
