services:
  backend:
    build:
      context: ./backend
    environment:
      APP_VERSION: ${APP_VERSION:-1.2.3}
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "8000:80"
    depends_on:
      - backend
