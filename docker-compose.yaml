services:
  backend:
    image: ${BACKEND_IMAGE:-simonangelfong/gitops-demo:backend}
    environment:
      APP_VERSION: ${APP_VERSION:-1.4.1}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  frontend:
    image: ${FRONTEND_IMAGE:-simonangelfong/gitops-demo:frontend}
    environment:
      BACKEND_URL: http://backend:8080
      NGINX_ENVSUBST_FILTER: BACKEND_URL
    ports:
      - "8000:80"
    depends_on:
      backend:
        condition: service_healthy
